# 서버(EC2)에 두어 배포 환경에서 실행할 docker-compose.prod.yml 파일입니다.

services:

  # -----------------
  # MySQL
  # -----------------
  mysql:
    image: mysql:8
    container_name: stock-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # -----------------
  # Redis Standalone
  # -----------------
  redis:
    image: bitnami/redis
    container_name: stock-redis
    hostname: redis
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - redis_data:/bitnami/redis/data
    ports:
      - "6379:6379"

  # -----------------
  # Frontend (Nginx Proxy)
  # -----------------
  frontend:
    image: ${DOCKER_USERNAME}/stock-frontend:latest
    container_name: stock-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app

  # -----------------
  # Certbot (SSL Certificate)
  # -----------------
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: certbot renew --quiet && sleep 12h

  # -----------------
  # Spring Boot App (운영 환경용 이미지 기반)
  # -----------------
  app:
    image: ${DOCKER_USERNAME}/stock-app:latest
    container_name: stock-app
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    env_file:
      - .env.prod
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    #    restart: always
    ports:
      - "8080:8080"

volumes:
  mysql_data:
  redis_data:
