# 프로덕션 환경 설정
# HTTPS를 사용하는 환경에서 사용

kis:
  app:
    key: ${KIS_APP_KEY}
    secret: ${KIS_APP_SECRET}
  domain:
    real: ${REAL_BASE_URL}
    virtual: ${VIRTUAL_BASE_URL}

jwt:
  secret:
    key: ${JWT_SECRET_KEY}
  
# 쿠키 보안 설정
cookie:
  secure: true  # HTTPS에서는 true로 설정
  domain: ${COOKIE_DOMAIN:}  # 실제 도메인 설정 (예: .example.com), 비어있으면 IP 주소 기반 동작


server:
  port: 80
#  ssl:
#    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: mappings


spring:
  config:
    import: optional:file:.env.prod[.properties]

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST}:3306/${MYSQL_DATABASE}?serverTimezone=Asia/Seoul
    username: ${MYSQL_NAME}
    password: ${MYSQL_PASSWORD}

  jpa:
    hibernate:
    #      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        open-in-view: false

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            #            client-id: 03ec9e7928bd99b8b63e716d1d2a2709
            client-secret: ${KAKAO_CLIENT_SECRET}
            #            client-secret: JLNPGGeywvcSFiCNltz7OTAJ6s2VvTBQ
            redirect-uri: ${KAKAO_REDIRECT_URL}
            #            redirect-uri: http://localhost:8080/login/oauth2/code/kakao
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - account_email
              - profile_image
            client-authentication-method: client_secret_post
            client-name: Kakao
          naver: # 네이버 OAuth 설정 추가
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            scope:
              - email
              - nickname
            client-name: Naver
            redirect-uri: ${NAVER_REDIRECT_URL}
            authorization-grant-type: authorization_code

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

  data:
    redis:
      sentinel:
        master: mymaster
        nodes:
          - ${REDIS_SENTINEL_NODE1:127.0.0.1:26379}
          - ${REDIS_SENTINEL_NODE2:127.0.0.1:26380}
          - ${REDIS_SENTINEL_NODE3:127.0.0.1:26381}


  flyway:
    enabled: true  # flyway ??(??? true)
    url: jdbc:mysql://${MYSQL_HOST}:3306/${MYSQL_DATABASE}?serverTimezone=Asia/Seoul  # DB ??
    username: ${MYSQL_NAME}
    password: ${MYSQL_PASSWORD}  # DB user ???
    baseline-on-migrate: true  # Baseline ??(???? ???? ?????? ?? ??? ??)
    locations: classpath:db/migration/{vendor}  #?????? ?? ?? ??(?? ??: db/migration )