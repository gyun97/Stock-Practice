kis:
  app:
    key: ${KIS_APP_KEY}
    secret: ${KIS_APP_SECRET}
  domain:
    real: ${REAL_BASE_URL}
    virtual: ${VIRTUAL_BASE_URL}


management:
  endpoints:
    web:
      exposure:
        include: mappings

jwt:
  secret:
    key: ${JWT_SECRET_KEY}
  
# 쿠키 보안 설정
cookie:
  secure: false  # localhost(HTTP)에서는 false, HTTPS에서는 true
  domain: null  # localhost에서는 null, 프로덕션에서는 실제 도메인

spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/stock
    username: ${MYSQL_NAME}
    password: ${MYSQL_PASSWORD}

    hikari:
      initialization-fail-timeout: 60000
      connection-timeout: 30000

  jpa:
    hibernate:
#      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        open-in-view: false

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URL}
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - account_email
              - profile_image
            client-authentication-method: client_secret_post
            client-name: Kakao
          naver: # 네이버 OAuth 설정 추가
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            scope:
              - email
              - nickname
            client-name: Naver
            redirect-uri: ${NAVER_REDIRECT_URL}
            authorization-grant-type: authorization_code

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
  data:
    redis:
      sentinel:
        master: mymaster
        nodes:
          - ${REDIS_SENTINEL_NODE1:127.0.0.1:26379}
          - ${REDIS_SENTINEL_NODE2:127.0.0.1:26380}
          - ${REDIS_SENTINEL_NODE3:127.0.0.1:26381}


  flyway:
    enabled: true  # flyway 

    url: jdbc:mysql://mysql:3306/stock
    username: ${MYSQL_NAME}
    password: ${MYSQL_PASSWORD}  
    baseline-on-migrate: true 
    locations: classpath:db/migration/{vendor} 

  logging:
    level:
      com.zaxxer.hikari: DEBUG
      org.springframework.jdbc: DEBUG
