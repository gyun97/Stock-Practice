kis:
  app:
    key: ${KIS_APP_KEY}
    secret: ${KIS_APP_SECRET}
  domain:
    real: ${REAL_BASE_URL}
    virtual: ${VIRTUAL_BASE_URL}

# ?? ??
server:
  port: 8080
#  ssl:
#    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: mappings

jwt:
  secret:
    key: ${JWT_SECRET_KEY}

spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST}:3306/${MYSQL_DATABASE}?serverTimezone=Asia/Seoul
    username: ${MYSQL_NAME}
    password: ${MYSQL_PASSWORD}

  jpa:
    hibernate:
#      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        open-in-view: false

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URL}
            authorization-grant-type: authorization_code
            scope:
              - profile
              - account_email
          naver: # 네이버 OAuth 설정 추가
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            scope:
              - email
              - nickname
            client-name: Naver
            redirect-uri: ${NAVER_REDIRECT_URL}
            authorization-grant-type: authorization_code
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

  # Redis ??
  redis:
    sentinel:
      master: mymaster
      nodes:
        - ${REDIS_SENTINEL_PORT1}:26379
        - ${REDIS_SENTINEL_PORT2}:26380
        - ${REDIS_SENTINEL_PORT3}:26381


  flyway:
    enabled: true  # flyway ??(??? true)
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE}?serverTimezone=Asia/Seoul  # DB ??
    username: ${MYSQL_NAME}  # DB user ???
    password: ${MYSQL_PASSWORD}  # DB user ???
    baseline-on-migrate: true  # Baseline ??(???? ???? ?????? ?? ??? ??)
    locations: classpath:db/migration/{vendor}  #?????? ?? ?? ??(?? ??: db/migration )