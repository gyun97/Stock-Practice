name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/stock-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/stock-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            # 1. 프로젝트 폴더로 위치 이동
            cd /home/ubuntu/stock 
            
            # 2. 최신 코드 레포지토리 가져오기 (충돌 방지를 위해 reset 사용)
            git fetch origin main
            git reset --hard origin/main
            
            # 3. 배포 환경용 .env.prod 파일 생성 및 변수 로드
            echo "${{ secrets.ENV_PROD }}" > .env.prod
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env.prod
            
            # 4. 서버에서 Docker Hub 로그인 (Private 이미지 Pull 권한 확보)
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # 5. 최신 도커 이미지 Pull
            docker-compose --env-file .env.prod -f docker-compose.prod.yml pull
            
            # 6. 컨테이너 강제 재생성 (Pull 받은 새 이미지 반영)
            docker-compose --env-file .env.prod -f docker-compose.prod.yml up -d --force-recreate
            
            # 7. 정리
            docker image prune -f
            docker logout
